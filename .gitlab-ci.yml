stages:
  - validate
  - test
  - build
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/caches/
    - .gradle/wrapper/
    - src/main/web/.npm/

requirements_review:
  stage: validate
  image: alpine:3.20
  script:
    - test -f README.md
    - test -f src/main/web/package-lock.json
    - test -f deploy/deploy.sh
    - test -f deploy/docker-compose.prod.yml
    - test -f deploy/nginx.conf.template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

backend_tests:
  stage: test
  image: gradle:8-jdk17
  script:
    - gradle test --no-daemon
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/TEST-*.xml
    paths:
      - build/reports/tests/test/
      - build/reports/problems/
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

frontend_tests:
  stage: test
  image: node:22-alpine
  before_script:
    - cd src/main/web
    - npm ci --cache .npm --prefer-offline
  script:
    - npm test
  artifacts:
    when: always
    paths:
      - src/main/web/coverage/
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

frontend_build:
  stage: build
  image: node:22-alpine
  needs:
    - frontend_tests
  before_script:
    - cd src/main/web
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    paths:
      - src/main/web/dist/
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

backend_build:
  stage: build
  image: gradle:8-jdk17
  needs:
    - backend_tests
  script:
    - gradle bootJar --no-daemon
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

deploy_vds:
  stage: deploy
  image: alpine:3.20
  needs:
    - backend_build
    - frontend_build
  before_script:
    - apk add --no-cache bash openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$VDS_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$VDS_HOST" >> ~/.ssh/known_hosts
  script:
    - bash deploy/ci-deploy-vds.sh
  environment:
    name: production
    url: https://$VDS_DOMAIN
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG'
      when: manual
      allow_failure: false
