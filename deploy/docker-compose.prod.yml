# MoodDiary — production deployment на VPS
# Перед запуском сгенерируйте nginx.runtime.conf: см. deploy.sh (envsubst из nginx.conf.template).
# AUTH_DOMAIN — публичный хост Keycloak (например auth.example.com); по умолчанию = DOMAIN.
# Использование: DOMAIN=app.example.com AUTH_DOMAIN=auth.example.com docker compose -f deploy/docker-compose.prod.yml up -d
# Для HTTP без SSL: PROTOCOL=http DOMAIN=... docker compose ...

services:
  postgres:
    image: postgres:15
    container_name: mooddiary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mooddiary
      POSTGRES_USER: mooddiary
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?Set KEYCLOAK_DB_PASSWORD}
    volumes:
      - mooddiary_pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-keycloak.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mooddiary -d mooddiary"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mooddiary

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: mooddiary-keycloak
    restart: unless-stopped
    command: ["start", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${PROTOCOL:-https}://${AUTH_DOMAIN:-$DOMAIN}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_PROXY_HEADERS: xforwarded
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?Set KEYCLOAK_DB_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/mooddiary-realm.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mooddiary

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: mooddiary-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mooddiary
      DB_USER: mooddiary
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8080
      KEYCLOAK_JWKS_URI: ${PROTOCOL:-https}://${AUTH_DOMAIN:-$DOMAIN}/realms/mooddiary/protocol/openid-connect/certs
      KEYCLOAK_ISSUER_URI: ${PROTOCOL:-https}://${AUTH_DOMAIN:-$DOMAIN}/realms/mooddiary
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      PHOTO_STORAGE_DIR: /app/data/photos
    volumes:
      - mooddiary_photos:/app/data/photos
    networks:
      - mooddiary

  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.nginx
      args:
        VITE_API_BASE_URL: ""
        VITE_KEYCLOAK_ISSUER_URI: ${PROTOCOL:-https}://${AUTH_DOMAIN:-$DOMAIN}/realms/mooddiary
    container_name: mooddiary-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.runtime.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - mooddiary

volumes:
  mooddiary_pgdata:
  mooddiary_photos:

networks:
  mooddiary:
    driver: bridge
